version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # eslint-plugin-tsdoc's @typescript-eslint chain cannot resolve against
      # TypeScript >= 6 yet; drop this rule once it can.
      - dependency-name: typescript
        versions: [">=6"]
    groups:
      npm-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
